name: publish

# Build the Native AOT standalone exe and attach it to a GitHub Release on a version tag.
# Runs on Windows: the target is net*-windows and AOT linking needs the MSVC toolchain,
# both of which the windows-latest runner provides. Push a tag like v1.0.1 to publish a release;
# a manual run just uploads the exe as a build artifact.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # create releases and upload assets

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Pure-logic unit tests only; the e2e suite needs an NVIDIA GPU + admin and self-skips off one.
      - name: Test
        run: dotnet test tests -c Release

      - name: Publish (Native AOT, standalone single-file exe)
        run: dotnet publish src -c Release

      - uses: actions/upload-artifact@v4
        with:
          name: simple-nvidia-undervolt
          path: src/publish/simple-nvidia-undervolt.exe
          if-no-files-found: error

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src/publish/simple-nvidia-undervolt.exe
